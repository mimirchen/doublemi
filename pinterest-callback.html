<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Pinterest 授权回调 — DoubleMi</title>
<style>
body{background:#16171A;color:#ECEAE3;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{max-width:560px;padding:40px;text-align:center}
code{display:block;background:#1C1D21;border:1px solid rgba(236,234,227,.16);border-radius:6px;padding:18px;font-size:15px;word-break:break-all;margin:18px 0;user-select:all}
.ok{color:#C9A227;letter-spacing:.2em;font-size:12px;text-transform:uppercase}
button{background:#C9A227;border:none;color:#171408;padding:12px 26px;border-radius:3px;font-size:14px;cursor:pointer;letter-spacing:.1em}
</style>
</head>
<body>
<div class="card">
  <p class="ok">Pinterest OAuth · DoubleMi</p>
  <h2 id="msg">读取授权码…</h2>
  <code id="code">—</code>
  <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">复制授权码</button>
  <p style="color:#6E6E67;font-size:13px;margin-top:18px">把这串授权码发给 Claude 即可，页面可以关闭。</p>
</div>
<script>
const c = new URLSearchParams(location.search).get("code");
document.getElementById("code").textContent = c || "(没有找到 code 参数)";
document.getElementById("msg").textContent = c ? "授权成功 ✓" : "授权失败或被拒绝";
</script>
</body>
</html>
